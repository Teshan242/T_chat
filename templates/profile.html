<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeShaN Chat - Profile</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo">TeShaN</div>
        <h2 class="form-title">My Profile</h2>
        
        {% if error %}
        <div class="error-message">{{error}}</div>
        {% endif %}
        
        <form id="profile-form" class="login-form">
            <div class="avatar-section">
                <div class="current-avatar" id="current-avatar">
                    {% if profile.avatar and profile.avatar.startswith('/') %}
                        <img src="{{profile.avatar}}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                    {% else %}
                        {{profile.avatar or '👤'}}
                    {% endif %}
                </div>
                <div class="avatar-upload">
                    <input type="file" id="avatar-file" name="avatar_file" accept="image/*" class="file-input">
                    <button type="button" class="avatar-upload-btn" onclick="document.getElementById('avatar-file').click()">
                        📷 Change Avatar
                    </button>
                </div>
            </div>
            
            <input name="username" placeholder="Username" value="{{profile.username}}" class="login-input" minlength="3" maxlength="20">
            <input name="password" type="password" placeholder="New Password (leave blank to keep current)" class="login-input">
            <input name="confirm_password" type="password" placeholder="Confirm New Password" class="login-input">
            
            <div class="profile-info">
                <p><strong>Member Since:</strong> {{profile.created_at}}</p>
                <p><strong>Status:</strong> {{profile.status}}</p>
            </div>
            
            <button type="submit" class="login-button">Update Profile</button>
        </form>
        
        <div class="profile-actions">
            <button class="tutorial-btn" onclick="restartTutorial()">🎯 Restart Tutorial</button>
            <button class="danger-btn" onclick="clearAllChats()">🗑️ Clear All My Chats</button>
            <a href="/chat" class="link">← Back to Chat</a>
        </div>
    </div>
</div>

<script>
document.getElementById('profile-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const password = formData.get('password');
    const confirmPassword = formData.get('confirm_password');
    
    if (password && password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
    }
    
    try {
        const response = await fetch('/update_profile', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            alert('Profile updated successfully!');
            // Refresh the page to show updated avatar
            window.location.reload();
        } else {
            alert('Error: ' + result.message);
        }
    } catch (error) {
        alert('Error updating profile: ' + error.message);
    }
});

async function clearAllChats() {
    if (confirm('Are you sure you want to clear all your chats? This action cannot be undone!')) {
        try {
            const response = await fetch('/clear_chats', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert('All chats cleared successfully!');
                window.location.href = '/chat';
            } else {
                alert('Error: ' + result.message);
            }
        } catch (error) {
            alert('Error clearing chats: ' + error.message);
        }
    }
}

// Handle avatar file selection
document.getElementById('avatar-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const avatarDiv = document.getElementById('current-avatar');
            avatarDiv.innerHTML = `<img src="${e.target.result}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
        };
        reader.readAsDataURL(file);
    }
});

function restartTutorial() {
    // Clear the tutorial completion flag
    localStorage.removeItem('tutorial_completed');
    
    // Show confirmation
    alert('Tutorial will restart when you go to the chat page!');
    
    // Redirect to chat to start the tutorial
    window.location.href = '/chat';
}

function testTutorial() {
    // Clear the tutorial completion flag for testing
    localStorage.removeItem('tutorial_completed');
    console.log('Tutorial flag cleared - will show on next chat page load');
}
</script>

<style>
.avatar-section {
    text-align: center;
    margin-bottom: 20px;
}

.current-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #25d366;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
    font-size: 32px;
    font-weight: bold;
    color: white;
    border: 3px solid #128c7e;
}

.avatar-upload-btn {
    background: #202c33;
    color: #e9edef;
    border: 1px solid #3b4a52;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}

.avatar-upload-btn:hover {
    background: #2a3942;
}

.profile-info {
    background: #202c33;
    padding: 15px;
    border-radius: 8px;
    margin: 15px 0;
    font-size: 14px;
    color: #e9edef;
}

.profile-info p {
    margin: 5px 0;
}

.profile-actions {
    margin-top: 20px;
    text-align: center;
}

.danger-btn {
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 10px;
    width: 100%;
}

.danger-btn:hover {
    background: #c82333;
}

.tutorial-btn {
    background: #25d366;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 10px;
    width: 100%;
}

.tutorial-btn:hover {
    background: #20b954;
}
</style>

<link rel="stylesheet" href="/static/style.css">
</body>
</html>
